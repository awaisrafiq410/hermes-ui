version: '3.8'

services:
  hermes-ui:
    build: .
    container_name: hermes-ui
    ports:
      - "8780:8780"
    environment:
      # Tell the UI exactly where the agent and its states live on the mapped volume
      - HERMES_HOME=/mnt/hdd_500gb/DATA/AppData/.hermes
      - AGENT_DIR=/mnt/hdd_500gb/DATA/AppData/hermes-agent
    volumes:
      # Mounting the parent storage root directory as requested for real-time inspection
      - /mnt/hdd_500gb/DATA/AppData/:/mnt/hdd_500gb/DATA/AppData/
    networks:
      - media-network
    restart: unless-stopped

networks:
  media-network:
    external: true
